# ChromaNet v3 — Default Configuration
# ======================================
# Edit this file to change training settings.
# All paths are relative to the project root.

model:
  encoder_channels: [64, 128, 256, 512, 512]
  decoder_channels: [512, 256, 128, 64, 32]
  attention:        true
  dropout:          0.1
  memory_slots:     32
  mem_dim:          256
  use_memory:       true
  use_scene:        true
  use_confidence:   true

data:
  root:         "C:/Users/bebo/Downloads/VOCtrainval_11-May-2012"
  image_size:   256
  batch_size:   12
  val_split:    0.05              # 5% of data used for validation
  augment:      true
  num_workers:  4                 # reduce to 0 on Windows if worker errors occur

training:
  epochs:           16
  lr:               0.00001
  weight_decay:     0.0001
  grad_clip:        1.0
  mixed_precision:  true          # uses RTX 3060 efficiently (AMP)
  amp_dtype:        "bfloat16"    # wider numerical range than float16 on RTX 4070
  checkpoint_dir:   "../../checkpoints/chromanet"
  log_every:        50            # print loss every N steps
  save_every:       1             # save every epoch for safe overnight resume
  preview_every:    1             # save validation comparison every epoch

loss:
  lambda_l1:            10.0
  lambda_perceptual:    1.0
  lambda_colorfulness:  0.5
  lambda_temporal:      2.0
  lambda_confidence:    0.5
  lambda_freq:          2.0
  lambda_multiscale:    1.0
  perceptual_layers:    ["relu2_2", "relu3_3"]

evaluation:
  metrics: ["psnr", "ssim", "colorfulness"]

scheduler:
  name:        "cosine"           # cosine annealing
  warmup_epochs: 3
  min_lr:      0.000001
